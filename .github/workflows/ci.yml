name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Tests
      run: npm test
      env:
        VITE_TREASURY_ADDRESS: ${{ secrets.VITE_TREASURY_ADDRESS }}

    - name: Build Application
      run: npm run build
      env:
        VITE_TREASURY_ADDRESS: ${{ secrets.VITE_TREASURY_ADDRESS }}
